name: blacklist-monitor

# Free hosting: GitHub Actions cron. ~5 min cadence (scheduled runs can be delayed under
# load — fine for the accepted 5-min tolerance). State persists via Actions cache so no
# git commits are needed between runs.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# Never run two ticks at once — they'd race on state.json.
concurrency:
  group: blacklist-monitor
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # Restore the latest cached state. restore-keys gives a prefix match so the first
      # run after a cache eviction still gets the most recent saved entry.
      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: blacklist-monitor-state-${{ github.run_id }}
          restore-keys: blacklist-monitor-state-

      - name: Run one monitor tick
        run: npm run tick
        env:
          RPC_ETHEREUM: ${{ secrets.RPC_ETHEREUM }}
          RPC_BASE: ${{ secrets.RPC_BASE }}
          RPC_ARBITRUM: ${{ secrets.RPC_ARBITRUM }}
          RPC_OPTIMISM: ${{ secrets.RPC_OPTIMISM }}
          RPC_POLYGON: ${{ secrets.RPC_POLYGON }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_SECURE: ${{ vars.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ vars.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          POLL_INTERVAL_MS: "0"
          STATE_FILE: ./state.json

      # Save updated state to cache. Uses run_id in the key so each run stores a new
      # entry; restore-keys prefix match above always picks the most recent one.
      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: blacklist-monitor-state-${{ github.run_id }}
