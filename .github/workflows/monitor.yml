name: blacklist-monitor

# Free hosting: GitHub Actions cron. ~5 min cadence (scheduled runs can be delayed under
# load — fine for the accepted 5-min tolerance). State persists by committing state.json
# back to the repo, so each run resumes from the saved cursor.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# Never run two ticks at once — they'd race on state.json and the push.
concurrency:
  group: blacklist-monitor
  cancel-in-progress: false

# Needed to commit the updated state.json back.
permissions:
  contents: write

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run one monitor tick
        run: npm run tick
        env:
          RPC_ETHEREUM: ${{ secrets.RPC_ETHEREUM }}
          RPC_BASE: ${{ secrets.RPC_BASE }}
          RPC_ARBITRUM: ${{ secrets.RPC_ARBITRUM }}
          RPC_OPTIMISM: ${{ secrets.RPC_OPTIMISM }}
          RPC_POLYGON: ${{ secrets.RPC_POLYGON }}
          EMAIL_API_URL: ${{ secrets.EMAIL_API_URL }}
          EMAIL_API_KEY: ${{ secrets.EMAIL_API_KEY }}
          EMAIL_API_AUTH_MODE: ${{ vars.EMAIL_API_AUTH_MODE }}
          EMAIL_API_AUTH_HEADER: ${{ vars.EMAIL_API_AUTH_HEADER }}
          POLL_INTERVAL_MS: "0"
          STATE_FILE: ./state.json

      # Persist the cursor/seen-set. Commit only if it actually changed.
      # [skip ci] keeps this commit from triggering other workflows.
      - name: Commit state
        if: always()
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "blacklist-monitor[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore(state): advance cursor [skip ci]"
            git push
          else
            echo "No state change."
          fi
